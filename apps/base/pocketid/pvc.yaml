---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pocketid-nfs-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: ${NFS_SERVER}
    path: ${NFS_PATH}/pocketid
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pocketid-data
  namespace: pocketid
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  resources:
    requests:
      storage: 10Gi
